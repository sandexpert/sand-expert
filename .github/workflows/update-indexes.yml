name: Update Content Indexes

on:
  push:
    paths:
      - 'data/destinations/*.json'
      - 'data/upcomingTrips/*.json'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري جداً لرفع التعديلات
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # لجلب التاريخ الكامل للـ Git لضمان نجاح الـ Push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate Indexes
        run: node scripts/generate-indexes.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # التحقق من وجود تغييرات فعلياً قبل المحاولة
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update indexes"
            git push origin HEAD # تحديد الوجهة بوضوح لتجنب خطأ الفروع
          fi
