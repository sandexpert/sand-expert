# 1. إعداد الوسائط العالمي (حسب التوثيق يستخدم input)
media:
  input: assets
  output: assets

# 2. تعريف المحتوى
content:
  - name: destinations
    label: "الرحلات القادمة"
    type: collection
    # التوثيق ينص على أن path هو للمجلد فقط
    path: data/destinations
    # التوثيق ينص على استخدام filename لتحديد اسم الملف الجديد
    filename: "{primary}.json"
    fields:
      - name: title
        label: "عنوان الوجهة"
        type: string
      - name: image
        label: "الصورة البارزة"
        type: image
        options:
          path: assets/articles_img
          unique: true
          rename: true
          categories: [image]
      - name: article
        label: "نص المقال"
        type: rich-text
        options:
          format: html
          switcher: false
          path: assets/content_img
          rename: true
  - name: Index
    label: index.json
    type: file
    path: data/destinations_index.json
