# 1. إعداد الوسائط العالمي (حسب التوثيق يستخدم input)
media:
  input: public/assets/content_img
  output: assets/content_img

# 2. تعريف المحتوى
content:
  - name: destinations
    label: "الوجهات السياحية"
    type: collection
    # التوثيق ينص على أن path هو للمجلد فقط
    path: public/data/destinations
    # التوثيق ينص على استخدام filename لتحديد اسم الملف الجديد
    filename: "{{slug}}.json"
    fields:
      - name: title
        label: "عنوان الوجهة"
        type: string
      - name: image
        label: "الصورة البارزة"
        type: image
        # ملاحظة: لا نضع path أو input هنا لكي لا يظهر خطأ
      - name: article
        label: "نص المقال"
        type: rich-text